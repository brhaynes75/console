<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Prototype - Console</title>
    <script src="/auth.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'surface-0': '#0d0d0d',
                        'surface-1': '#141414',
                        'surface-2': '#1a1a1a',
                        'surface-3': '#222222',
                        'border': '#2a2a2a',
                        'border-hover': '#3a3a3a',
                        'text-primary': '#e5e5e5',
                        'text-secondary': '#888888',
                        'text-muted': '#555555',
                        'accent': '#706AE7',
                    }
                }
            }
        }
    </script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        
        .sidebar {
            transition: width var(--transition-duration, 300ms) var(--transition-easing, cubic-bezier(0.4, 0, 0.2, 1));
        }
        
        .sidebar-content {
            transition: opacity var(--content-fade, 150ms) ease;
        }
        
        .nav-item {
            transition: all 150ms ease;
        }
        
        .config-panel {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        
        /* Animation variants */
        .anim-spring { --transition-easing: cubic-bezier(0.34, 1.56, 0.64, 1); }
        .anim-smooth { --transition-easing: cubic-bezier(0.4, 0, 0.2, 1); }
        .anim-snappy { --transition-easing: cubic-bezier(0.2, 0, 0, 1); }
        .anim-bounce { --transition-easing: cubic-bezier(0.68, -0.55, 0.265, 1.55); }
    </style>
</head>
<body class="bg-surface-0 text-text-primary h-screen overflow-hidden">
    <div id="app" class="h-full flex">
        
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar flex flex-col bg-surface-1 border-r border-border overflow-hidden" style="width: 280px;">
            <!-- Header -->
            <div class="h-12 flex items-center px-3 border-b border-border">
                <div class="flex items-center gap-2 sidebar-content">
                    <div class="w-7 h-7 rounded bg-surface-3 flex items-center justify-center flex-shrink-0">
                        <svg class="w-4 h-4 text-text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                        </svg>
                    </div>
                    <span class="text-sm font-medium whitespace-nowrap">Console</span>
                </div>
            </div>
            
            <!-- Navigation -->
            <nav class="flex-1 overflow-y-auto py-2 px-2">
                <div class="space-y-1">
                    <a href="#" class="nav-item flex items-center gap-3 px-3 py-2 rounded-md bg-surface-2 text-text-primary">
                        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                        </svg>
                        <span class="sidebar-content whitespace-nowrap">Conversations</span>
                    </a>
                    <a href="#" class="nav-item flex items-center gap-3 px-3 py-2 rounded-md hover:bg-surface-2 text-text-secondary hover:text-text-primary">
                        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                        </svg>
                        <span class="sidebar-content whitespace-nowrap">Tasks</span>
                    </a>
                    <a href="#" class="nav-item flex items-center gap-3 px-3 py-2 rounded-md hover:bg-surface-2 text-text-secondary hover:text-text-primary">
                        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
                        </svg>
                        <span class="sidebar-content whitespace-nowrap">Projects</span>
                    </a>
                    <a href="#" class="nav-item flex items-center gap-3 px-3 py-2 rounded-md hover:bg-surface-2 text-text-secondary hover:text-text-primary">
                        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                        </svg>
                        <span class="sidebar-content whitespace-nowrap">Documentation</span>
                    </a>
                </div>
                
                <div class="mt-6 pt-4 border-t border-border">
                    <div class="px-3 mb-2">
                        <span class="sidebar-content text-xs text-text-muted uppercase tracking-wide">Recent</span>
                    </div>
                    <div class="space-y-0.5">
                        <a href="#" class="nav-item flex items-center gap-3 px-3 py-2 rounded-md hover:bg-surface-2 text-text-secondary hover:text-text-primary">
                            <div class="w-5 h-5 flex-shrink-0 flex items-center justify-center">
                                <div class="w-2 h-2 rounded-full bg-accent"></div>
                            </div>
                            <span class="sidebar-content whitespace-nowrap truncate">API Integration</span>
                        </a>
                        <a href="#" class="nav-item flex items-center gap-3 px-3 py-2 rounded-md hover:bg-surface-2 text-text-secondary hover:text-text-primary">
                            <div class="w-5 h-5 flex-shrink-0 flex items-center justify-center">
                                <div class="w-2 h-2 rounded-full bg-green-500"></div>
                            </div>
                            <span class="sidebar-content whitespace-nowrap truncate">Bug fix: auth flow</span>
                        </a>
                        <a href="#" class="nav-item flex items-center gap-3 px-3 py-2 rounded-md hover:bg-surface-2 text-text-secondary hover:text-text-primary">
                            <div class="w-5 h-5 flex-shrink-0 flex items-center justify-center">
                                <div class="w-2 h-2 rounded-full bg-yellow-500"></div>
                            </div>
                            <span class="sidebar-content whitespace-nowrap truncate">Component refactor</span>
                        </a>
                    </div>
                </div>
            </nav>
            
            <!-- Footer -->
            <div class="border-t border-border p-3">
                <button id="collapseBtn" class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-md hover:bg-surface-2 text-text-secondary hover:text-text-primary">
                    <svg id="collapseIcon" class="w-5 h-5 flex-shrink-0 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/>
                    </svg>
                    <span class="sidebar-content whitespace-nowrap">Collapse</span>
                </button>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="flex-1 flex flex-col bg-surface-0 min-w-0">
            <div class="h-12 flex items-center px-4 border-b border-border">
                <span class="text-sm text-text-primary">Navigation Collapse/Expand Prototype</span>
            </div>
            <div class="flex-1 flex items-center justify-center">
                <div class="text-center">
                    <p class="text-text-secondary mb-2">Use the config panel to try different navigation behaviors</p>
                    <p class="text-sm text-text-muted">Or click the collapse button in the sidebar / press Cmd+B</p>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Configuration Panel -->
    <div id="configPanel" class="config-panel fixed bottom-4 right-4 bg-surface-2/90 border border-border rounded-lg shadow-xl overflow-hidden" style="width: 280px;">
        <div class="flex items-center justify-between px-3 py-2 border-b border-border bg-surface-3/50">
            <span class="text-xs font-medium text-text-secondary uppercase tracking-wide">Navigation Options</span>
            <button id="configToggle" class="w-5 h-5 rounded hover:bg-surface-3 flex items-center justify-center transition-colors">
                <svg class="w-3 h-3 text-text-muted transform transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                </svg>
            </button>
        </div>
        
        <div id="configContent" class="p-3 space-y-4">
            <!-- Collapse Mode -->
            <div>
                <label class="text-xs text-text-muted block mb-2">Collapse Behavior</label>
                <div class="grid grid-cols-2 gap-1">
                    <button class="mode-btn active px-2 py-1.5 text-xs rounded bg-surface-3 text-text-primary border border-transparent" data-mode="icon-rail">
                        Icon Rail
                    </button>
                    <button class="mode-btn px-2 py-1.5 text-xs rounded bg-transparent text-text-secondary border border-border hover:border-border-hover" data-mode="full-hide">
                        Full Hide
                    </button>
                    <button class="mode-btn px-2 py-1.5 text-xs rounded bg-transparent text-text-secondary border border-border hover:border-border-hover" data-mode="hover-expand">
                        Hover Expand
                    </button>
                    <button class="mode-btn px-2 py-1.5 text-xs rounded bg-transparent text-text-secondary border border-border hover:border-border-hover" data-mode="overlay">
                        Overlay
                    </button>
                </div>
            </div>
            
            <!-- Animation Style -->
            <div>
                <label class="text-xs text-text-muted block mb-2">Animation Style</label>
                <div class="grid grid-cols-2 gap-1">
                    <button class="anim-btn active px-2 py-1.5 text-xs rounded bg-surface-3 text-text-primary border border-transparent" data-anim="smooth">
                        Smooth
                    </button>
                    <button class="anim-btn px-2 py-1.5 text-xs rounded bg-transparent text-text-secondary border border-border hover:border-border-hover" data-anim="spring">
                        Spring
                    </button>
                    <button class="anim-btn px-2 py-1.5 text-xs rounded bg-transparent text-text-secondary border border-border hover:border-border-hover" data-anim="snappy">
                        Snappy
                    </button>
                    <button class="anim-btn px-2 py-1.5 text-xs rounded bg-transparent text-text-secondary border border-border hover:border-border-hover" data-anim="bounce">
                        Bounce
                    </button>
                </div>
            </div>
            
            <!-- Collapsed Width -->
            <div>
                <label class="text-xs text-text-muted block mb-2">Collapsed Width: <span id="widthValue">60</span>px</label>
                <input type="range" min="48" max="80" value="60" class="w-full h-1 bg-surface-3 rounded-lg appearance-none cursor-pointer" id="collapsedWidth">
            </div>
            
            <!-- Duration -->
            <div>
                <label class="text-xs text-text-muted block mb-2">Duration: <span id="durationValue">300</span>ms</label>
                <input type="range" min="150" max="500" value="300" class="w-full h-1 bg-surface-3 rounded-lg appearance-none cursor-pointer" id="duration">
            </div>
            
            <!-- Content Fade -->
            <div class="flex items-center justify-between">
                <label class="text-xs text-text-muted">Fade text on collapse</label>
                <button id="fadeToggle" class="w-10 h-5 rounded-full bg-accent relative transition-colors">
                    <div class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-white transform transition-transform translate-x-5"></div>
                </button>
            </div>
        </div>
    </div>

    <script>
        const state = {
            collapsed: false,
            mode: 'icon-rail',
            animation: 'smooth',
            collapsedWidth: 60,
            expandedWidth: 280,
            duration: 300,
            fadeContent: true
        };
        
        const sidebar = document.getElementById('sidebar');
        const collapseBtn = document.getElementById('collapseBtn');
        const collapseIcon = document.getElementById('collapseIcon');
        const configContent = document.getElementById('configContent');
        const configToggle = document.getElementById('configToggle');
        
        function updateCSS() {
            sidebar.style.setProperty('--transition-duration', `${state.duration}ms`);
            
            const easings = {
                smooth: 'cubic-bezier(0.4, 0, 0.2, 1)',
                spring: 'cubic-bezier(0.34, 1.56, 0.64, 1)',
                snappy: 'cubic-bezier(0.2, 0, 0, 1)',
                bounce: 'cubic-bezier(0.68, -0.55, 0.265, 1.55)'
            };
            sidebar.style.setProperty('--transition-easing', easings[state.animation]);
            sidebar.style.setProperty('--content-fade', state.fadeContent ? '150ms' : '0ms');
        }
        
        function toggleSidebar() {
            state.collapsed = !state.collapsed;
            applySidebarState();
        }
        
        function applySidebarState() {
            const contentElements = sidebar.querySelectorAll('.sidebar-content');
            
            switch (state.mode) {
                case 'icon-rail':
                    sidebar.style.width = state.collapsed ? `${state.collapsedWidth}px` : `${state.expandedWidth}px`;
                    sidebar.style.position = 'relative';
                    sidebar.style.opacity = '1';
                    contentElements.forEach(el => {
                        el.style.opacity = state.collapsed ? '0' : '1';
                        el.style.visibility = state.collapsed ? 'hidden' : 'visible';
                    });
                    break;
                    
                case 'full-hide':
                    sidebar.style.width = state.collapsed ? '0' : `${state.expandedWidth}px`;
                    sidebar.style.position = 'relative';
                    sidebar.style.opacity = state.collapsed ? '0' : '1';
                    break;
                    
                case 'hover-expand':
                    sidebar.style.width = state.collapsed ? `${state.collapsedWidth}px` : `${state.expandedWidth}px`;
                    sidebar.style.position = 'relative';
                    contentElements.forEach(el => {
                        el.style.opacity = state.collapsed ? '0' : '1';
                        el.style.visibility = state.collapsed ? 'hidden' : 'visible';
                    });
                    
                    if (state.collapsed) {
                        sidebar.onmouseenter = () => {
                            sidebar.style.width = `${state.expandedWidth}px`;
                            contentElements.forEach(el => {
                                el.style.opacity = '1';
                                el.style.visibility = 'visible';
                            });
                        };
                        sidebar.onmouseleave = () => {
                            sidebar.style.width = `${state.collapsedWidth}px`;
                            contentElements.forEach(el => {
                                el.style.opacity = '0';
                                el.style.visibility = 'hidden';
                            });
                        };
                    } else {
                        sidebar.onmouseenter = null;
                        sidebar.onmouseleave = null;
                    }
                    break;
                    
                case 'overlay':
                    if (state.collapsed) {
                        sidebar.style.width = `${state.collapsedWidth}px`;
                        sidebar.style.position = 'relative';
                        contentElements.forEach(el => {
                            el.style.opacity = '0';
                            el.style.visibility = 'hidden';
                        });
                        
                        sidebar.onmouseenter = () => {
                            sidebar.style.position = 'absolute';
                            sidebar.style.zIndex = '50';
                            sidebar.style.height = '100%';
                            sidebar.style.boxShadow = '4px 0 24px rgba(0,0,0,0.5)';
                            sidebar.style.width = `${state.expandedWidth}px`;
                            contentElements.forEach(el => {
                                el.style.opacity = '1';
                                el.style.visibility = 'visible';
                            });
                        };
                        sidebar.onmouseleave = () => {
                            sidebar.style.position = 'relative';
                            sidebar.style.zIndex = '';
                            sidebar.style.boxShadow = '';
                            sidebar.style.width = `${state.collapsedWidth}px`;
                            contentElements.forEach(el => {
                                el.style.opacity = '0';
                                el.style.visibility = 'hidden';
                            });
                        };
                    } else {
                        sidebar.style.width = `${state.expandedWidth}px`;
                        sidebar.style.position = 'relative';
                        sidebar.style.boxShadow = '';
                        sidebar.onmouseenter = null;
                        sidebar.onmouseleave = null;
                        contentElements.forEach(el => {
                            el.style.opacity = '1';
                            el.style.visibility = 'visible';
                        });
                    }
                    break;
            }
            
            collapseIcon.style.transform = state.collapsed ? 'rotate(180deg)' : '';
        }
        
        function updateButtonStates() {
            document.querySelectorAll('.mode-btn').forEach(btn => {
                const isActive = btn.dataset.mode === state.mode;
                btn.classList.toggle('active', isActive);
                btn.classList.toggle('bg-surface-3', isActive);
                btn.classList.toggle('text-text-primary', isActive);
                btn.classList.toggle('border-transparent', isActive);
                btn.classList.toggle('bg-transparent', !isActive);
                btn.classList.toggle('text-text-secondary', !isActive);
                btn.classList.toggle('border-border', !isActive);
            });
            
            document.querySelectorAll('.anim-btn').forEach(btn => {
                const isActive = btn.dataset.anim === state.animation;
                btn.classList.toggle('active', isActive);
                btn.classList.toggle('bg-surface-3', isActive);
                btn.classList.toggle('text-text-primary', isActive);
                btn.classList.toggle('border-transparent', isActive);
                btn.classList.toggle('bg-transparent', !isActive);
                btn.classList.toggle('text-text-secondary', !isActive);
                btn.classList.toggle('border-border', !isActive);
            });
        }
        
        // Event Listeners
        collapseBtn.addEventListener('click', toggleSidebar);
        
        configToggle.addEventListener('click', () => {
            const isCollapsed = configContent.style.display === 'none';
            configContent.style.display = isCollapsed ? 'block' : 'none';
            configToggle.querySelector('svg').style.transform = isCollapsed ? '' : 'rotate(180deg)';
        });
        
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                state.mode = btn.dataset.mode;
                sidebar.onmouseenter = null;
                sidebar.onmouseleave = null;
                updateButtonStates();
                applySidebarState();
            });
        });
        
        document.querySelectorAll('.anim-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                state.animation = btn.dataset.anim;
                updateButtonStates();
                updateCSS();
            });
        });
        
        document.getElementById('collapsedWidth').addEventListener('input', (e) => {
            state.collapsedWidth = parseInt(e.target.value);
            document.getElementById('widthValue').textContent = state.collapsedWidth;
            if (state.collapsed) applySidebarState();
        });
        
        document.getElementById('duration').addEventListener('input', (e) => {
            state.duration = parseInt(e.target.value);
            document.getElementById('durationValue').textContent = state.duration;
            updateCSS();
        });
        
        document.getElementById('fadeToggle').addEventListener('click', (e) => {
            state.fadeContent = !state.fadeContent;
            const toggle = e.currentTarget;
            const dot = toggle.querySelector('div');
            toggle.classList.toggle('bg-accent', state.fadeContent);
            toggle.classList.toggle('bg-surface-3', !state.fadeContent);
            dot.style.transform = state.fadeContent ? 'translateX(20px)' : 'translateX(0)';
            updateCSS();
        });
        
        document.addEventListener('keydown', (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === 'b') {
                e.preventDefault();
                toggleSidebar();
            }
        });
        
        // Initialize
        updateCSS();
        updateButtonStates();
    </script>
</body>
</html>
