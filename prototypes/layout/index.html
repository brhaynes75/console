<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console – Layout Baseline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'surface-0': '#0d0d0d',
                        'surface-1': '#141414',
                        'surface-2': '#1a1a1a',
                        'surface-3': '#222222',
                        'border': '#2a2a2a',
                        'border-hover': '#3a3a3a',
                        'text-primary': '#e5e5e5',
                        'text-secondary': '#888888',
                        'text-muted': '#555555',
                        'accent': '#3b82f6',
                    }
                }
            }
        }
    </script>
    <!--
    ┌─────────────────────────────────────────────────────────────┐
    │  DESIGN SPEC — Pixel values for Figma verification         │
    ├─────────────────────────────────────────────────────────────┤
    │                                                             │
    │  COLORS (from CLAUDE.md design tokens)                      │
    │    surface-0: #0d0d0d   (deepest bg, conversation, canvas)  │
    │    surface-1: #141414   (icon rail, panels)                 │
    │    surface-2: #1a1a1a   (elevated: user bubble, canvas box) │
    │    surface-3: #222222   (hover, active items)               │
    │    border:    #2a2a2a   (all dividers)                      │
    │    text-primary:   #e5e5e5                                  │
    │    text-secondary: #888888                                  │
    │    text-muted:     #555555                                  │
    │    accent:         #3b82f6                                  │
    │                                                             │
    │  LAYOUT WIDTHS                                              │
    │    icon-rail:    44px                                        │
    │    conversation: 380px (default), 320px (compact)           │
    │    canvas:       flex 1 (fills remaining)                   │
    │                                                             │
    │  ICON RAIL                                                  │
    │    padding:        8px all sides                            │
    │    logo icon:      28×28px, border-radius 6px              │
    │    action icons:   28×28px                                  │
    │    icon gap:       4px                                      │
    │    bottom icons:   18×18px, gap 4px, 8px from bottom       │
    │    icon color:     #888888 (text-secondary)                 │
    │    icon stroke:    1.5px                                    │
    │                                                             │
    │  CONVERSATION PANEL                                         │
    │    header-h:       48px                                     │
    │    title font:     14px / 500 weight                        │
    │    content pad:    16px horizontal, 20px vertical           │
    │    user bubble:    bg surface-2, radius 8px, pad 12px 16px │
    │    asst icon:      16×16px, gap 10px from text              │
    │    message font:   14px / 400 weight                        │
    │    message gap:    16px between messages                    │
    │    input area:     pad 16px, textarea pad 12px 16px         │
    │                                                             │
    │  CANVAS PANEL                                               │
    │    tab-bar-h:      40px, pad 8px 12px                      │
    │    tab pill:       pad 6px 10px, radius 6px, font 13px     │
    │    active tab:     border 1px #3a3a3a, bg transparent       │
    │    inactive tab:   border 1px #2a2a2a, text-muted           │
    │    tab close icon: 12×12px                                  │
    │    heading bar:    pad 8px 16px, font 14px / 500            │
    │    content box:    margin 12px, radius 8px, bg surface-2    │
    │                                                             │
    │  TYPOGRAPHY                                                 │
    │    font-family: -apple-system, BlinkMacSystemFont,          │
    │                 'Segoe UI', Roboto, sans-serif              │
    │    base size:   14px                                        │
    │    small:       13px                                        │
    │    xs:          12px                                        │
    │    xxs:         11px                                        │
    │                                                             │
    │  TRANSITIONS                                                │
    │    layout: 0.3s cubic-bezier(0.4, 0, 0.2, 1)              │
    │    opacity: 0.2s ease                                      │
    │    hover: 0.15s ease                                       │
    │                                                             │
    │  SCROLLBAR                                                  │
    │    width: 6px, track: transparent                           │
    │    thumb: rgba(255,255,255,0.1), radius 3px                │
    │                                                             │
    └─────────────────────────────────────────────────────────────┘
    -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

        .panel-transition {
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.2s ease,
                        transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .rail-icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            color: #888;
            cursor: pointer;
            transition: background 0.15s ease, color 0.15s ease;
        }
        .rail-icon:hover { background: #222; color: #e5e5e5; }

        .rail-icon-sm {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            color: #555;
            cursor: pointer;
            transition: background 0.15s ease, color 0.15s ease;
        }
        .rail-icon-sm:hover { background: #222; color: #888; }

        .tab-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: nowrap;
        }
        .tab-pill.active {
            border: 1px solid #3a3a3a;
            color: #e5e5e5;
            background: transparent;
        }
        .tab-pill.inactive {
            border: 1px solid transparent;
            color: #555;
            background: transparent;
        }
        .tab-pill.inactive:hover {
            color: #888;
        }
        .tab-close {
            width: 14px;
            height: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 3px;
            color: inherit;
            opacity: 0.5;
            transition: opacity 0.15s ease;
        }
        .tab-close:hover { opacity: 1; }

        .config-panel {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        textarea:focus { outline: none; }
    </style>
</head>
<body class="bg-surface-0 text-text-primary h-screen overflow-hidden">
    <div id="app" class="h-full flex">

        <!-- ═══════════════════════════════════════════════════ -->
        <!-- ICON RAIL — 44px fixed                             -->
        <!-- ═══════════════════════════════════════════════════ -->
        <nav id="iconRail" class="panel-transition flex flex-col items-center bg-surface-1 border-r border-border" style="width: 44px; padding: 8px 0;">
            <!-- Top cluster -->
            <div class="flex flex-col items-center" style="gap: 4px;">
                <!-- Logo / Console icon -->
                <div class="rail-icon" style="background: #222;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M8 9l3 3-3 3"/>
                        <path d="M13 15h3"/>
                        <rect x="3" y="4" width="18" height="16" rx="2"/>
                    </svg>
                </div>
                <!-- New conversation -->
                <div class="rail-icon" id="newChatBtn" title="New conversation">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 5v14"/>
                        <path d="M5 12h14"/>
                    </svg>
                </div>
            </div>

            <!-- Spacer -->
            <div class="flex-1"></div>

            <!-- Bottom cluster -->
            <div class="flex flex-col items-center" style="gap: 4px; padding-bottom: 4px;">
                <div class="rail-icon-sm" title="Connections">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="6" cy="18" r="3"/><circle cx="18" cy="6" r="3"/>
                        <path d="M8.59 15.41L15.41 8.59"/>
                    </svg>
                </div>
                <div class="rail-icon-sm" title="Sync">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
                        <path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
                    </svg>
                </div>
            </div>
        </nav>

        <!-- ═══════════════════════════════════════════════════ -->
        <!-- CONVERSATION PANEL                                  -->
        <!-- ═══════════════════════════════════════════════════ -->
        <section id="conversation" class="panel-transition flex flex-col bg-surface-0 border-r border-border" style="width: 380px;">
            <!-- Header -->
            <div class="flex items-center" style="height: 48px; padding: 0 16px;">
                <span style="font-size: 14px; font-weight: 500;" class="text-text-primary">Conversation title</span>
            </div>

            <!-- Messages -->
            <div class="flex-1 overflow-y-auto" style="padding: 4px 16px 20px 16px;">
                <div style="display: flex; flex-direction: column; gap: 16px;">
                    <!-- User message -->
                    <div class="bg-surface-2" style="border-radius: 8px; padding: 12px 16px;">
                        <p style="font-size: 14px; color: #e5e5e5;">User initiated message</p>
                    </div>

                    <!-- Assistant message -->
                    <div style="display: flex; align-items: flex-start; gap: 10px;">
                        <div style="width: 16px; height: 16px; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="4" width="18" height="16" rx="2"/>
                                <path d="M8 9l3 3-3 3"/><path d="M13 15h3"/>
                            </svg>
                        </div>
                        <p style="font-size: 14px; color: #e5e5e5;">Console reply.</p>
                    </div>
                </div>
            </div>

            <!-- Input -->
            <div style="padding: 12px 16px 16px 16px;">
                <div class="bg-surface-2 border border-border" style="border-radius: 8px; transition: border-color 0.15s ease;" onfocus="this.style.borderColor='#3a3a3a'" onblur="this.style.borderColor='#2a2a2a'">
                    <textarea
                        rows="1"
                        placeholder="Type a message..."
                        style="width: 100%; background: transparent; padding: 10px 14px; font-size: 14px; color: #e5e5e5; resize: none; border: none; outline: none; font-family: inherit;"
                    ></textarea>
                </div>
            </div>
        </section>

        <!-- ═══════════════════════════════════════════════════ -->
        <!-- CANVAS PANEL                                        -->
        <!-- ═══════════════════════════════════════════════════ -->
        <section id="canvas" class="panel-transition flex-1 flex flex-col bg-surface-0 min-w-0">
            <!-- Tab bar -->
            <div class="flex items-center" style="height: 40px; padding: 0 12px; gap: 4px;">
                <div class="tab-pill active">
                    <span>Active tab</span>
                    <div class="tab-close">
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
                    </div>
                </div>
                <div class="tab-pill inactive">
                    <span>Inactive tab</span>
                    <div class="tab-close">
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
                    </div>
                </div>
            </div>

            <!-- Canvas heading -->
            <div class="flex items-center justify-between" style="padding: 4px 16px 8px 16px;">
                <span style="font-size: 14px; font-weight: 500;" class="text-text-primary">Canvas heading</span>
                <button class="rail-icon-sm" style="width: 24px; height: 24px;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/>
                    </svg>
                </button>
            </div>

            <!-- Canvas content area -->
            <div class="flex-1 flex items-center justify-center bg-surface-2" style="margin: 0 12px 12px 12px; border-radius: 8px;">
                <span style="font-size: 14px;" class="text-text-muted">Canvas contents</span>
            </div>
        </section>
    </div>

    <!-- ═══════════════════════════════════════════════════════ -->
    <!-- PROTOTYPE OPTIONS PANEL                                 -->
    <!-- ═══════════════════════════════════════════════════════ -->
    <div id="configPanel" class="config-panel" style="position: fixed; bottom: 16px; right: 16px; z-index: 9999; width: 240px; background: rgba(20,20,20,0.92); border: 1px solid #2a2a2a; border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); overflow: hidden;">
        <!-- Header -->
        <div style="display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid #2a2a2a; background: rgba(34,34,34,0.4);">
            <span style="font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.05em;">Options</span>
            <button id="configToggle" style="width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; border-radius: 4px; border: none; background: none; cursor: pointer; color: #555; transition: color 0.15s ease;" onmouseover="this.style.color='#888'" onmouseout="this.style.color='#555'">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 9l-7 7-7-7"/></svg>
            </button>
        </div>

        <!-- Content -->
        <div id="configContent" style="padding: 12px;">
            <!-- Sidebar -->
            <div style="margin-bottom: 12px;">
                <label style="font-size: 11px; color: #555; display: block; margin-bottom: 6px;">Sidebar</label>
                <div style="display: flex; gap: 4px;">
                    <button class="opt-btn active" data-group="sidebar" data-value="expanded">Expanded</button>
                    <button class="opt-btn" data-group="sidebar" data-value="collapsed">Collapsed</button>
                    <button class="opt-btn" data-group="sidebar" data-value="hidden">Hidden</button>
                </div>
            </div>

            <!-- Canvas -->
            <div style="margin-bottom: 12px;">
                <label style="font-size: 11px; color: #555; display: block; margin-bottom: 6px;">Canvas</label>
                <div style="display: flex; gap: 4px;">
                    <button class="opt-btn active" data-group="canvas" data-value="visible">Visible</button>
                    <button class="opt-btn" data-group="canvas" data-value="hidden">Hidden</button>
                </div>
            </div>

            <!-- Density -->
            <div>
                <label style="font-size: 11px; color: #555; display: block; margin-bottom: 6px;">Density</label>
                <div style="display: flex; gap: 4px;">
                    <button class="opt-btn active" data-group="density" data-value="default">Default</button>
                    <button class="opt-btn" data-group="density" data-value="compact">Compact</button>
                </div>
            </div>
        </div>
    </div>

    <style>
        .opt-btn {
            flex: 1;
            padding: 5px 0;
            font-size: 11px;
            font-family: inherit;
            border-radius: 5px;
            border: 1px solid #2a2a2a;
            background: transparent;
            color: #888;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .opt-btn:hover {
            border-color: #3a3a3a;
            color: #e5e5e5;
        }
        .opt-btn.active {
            background: #222;
            border-color: transparent;
            color: #e5e5e5;
        }
    </style>

    <script>
        const state = {
            sidebar: 'expanded',   // expanded | collapsed | hidden
            canvas: 'visible',     // visible | hidden
            density: 'default'     // default | compact
        };

        const els = {
            rail: document.getElementById('iconRail'),
            conv: document.getElementById('conversation'),
            canvas: document.getElementById('canvas'),
            configContent: document.getElementById('configContent'),
            configToggle: document.getElementById('configToggle'),
        };

        const widths = {
            rail: 44,
            convDefault: 380,
            convCompact: 320,
        };

        // ── Layout application ────────────────────────────
        function applyLayout() {
            const convWidth = state.density === 'compact' ? widths.convCompact : widths.convDefault;

            // Icon rail
            if (state.sidebar === 'hidden') {
                els.rail.style.width = '0';
                els.rail.style.opacity = '0';
                els.rail.style.overflow = 'hidden';
                els.rail.style.borderRight = 'none';
            } else {
                els.rail.style.width = widths.rail + 'px';
                els.rail.style.opacity = '1';
                els.rail.style.overflow = 'visible';
                els.rail.style.borderRight = '';
            }

            // Conversation panel
            if (state.sidebar === 'hidden') {
                els.conv.style.width = '0';
                els.conv.style.opacity = '0';
                els.conv.style.overflow = 'hidden';
                els.conv.style.borderRight = 'none';
            } else if (state.sidebar === 'collapsed') {
                els.conv.style.width = '0';
                els.conv.style.opacity = '0';
                els.conv.style.overflow = 'hidden';
                els.conv.style.borderRight = 'none';
            } else {
                els.conv.style.width = convWidth + 'px';
                els.conv.style.opacity = '1';
                els.conv.style.overflow = '';
                els.conv.style.borderRight = '';
            }

            // Canvas
            if (state.canvas === 'hidden') {
                els.canvas.style.display = 'none';
            } else {
                els.canvas.style.display = 'flex';
            }

            // Density adjustments
            const msgGap = state.density === 'compact' ? '10px' : '16px';
            const contentPad = state.density === 'compact' ? '12px' : '16px';
            document.querySelectorAll('[data-density-gap]').forEach(el => {
                el.style.gap = msgGap;
            });
        }

        // ── Button state management ────────────────────────
        function updateButtons() {
            document.querySelectorAll('.opt-btn').forEach(btn => {
                const group = btn.dataset.group;
                const value = btn.dataset.value;
                const isActive = state[group] === value;
                btn.classList.toggle('active', isActive);
            });
        }

        // ── Event: option buttons ────────────────────────
        document.querySelectorAll('.opt-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const group = btn.dataset.group;
                const value = btn.dataset.value;
                state[group] = value;
                updateButtons();
                applyLayout();
            });
        });

        // ── Event: config panel toggle ────────────────────
        els.configToggle.addEventListener('click', () => {
            const content = els.configContent;
            const isCollapsed = content.style.display === 'none';
            content.style.display = isCollapsed ? 'block' : 'none';
            els.configToggle.querySelector('svg').style.transform = isCollapsed ? '' : 'rotate(180deg)';
        });

        // ── Event: keyboard shortcuts ────────────────────
        document.addEventListener('keydown', (e) => {
            if (e.metaKey || e.ctrlKey) {
                if (e.key === 'b') {
                    e.preventDefault();
                    const states = ['expanded', 'collapsed', 'hidden'];
                    const i = states.indexOf(state.sidebar);
                    state.sidebar = states[(i + 1) % states.length];
                    updateButtons();
                    applyLayout();
                }
                if (e.key === '\\') {
                    e.preventDefault();
                    state.canvas = state.canvas === 'visible' ? 'hidden' : 'visible';
                    updateButtons();
                    applyLayout();
                }
            }
        });

        // ── Initialize ────────────────────────
        applyLayout();
    </script>
</body>
</html>
