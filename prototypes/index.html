<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console Prototypes</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #101012;
            color: #D3D3D3;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 80px 24px;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            width: 550px;
            max-width: 100%;
        }
        h1 {
            font-size: 14px;
            font-weight: 600;
            color: #6D6D77;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 24px;
        }
        .list {
            display: flex;
            flex-direction: column;
            gap: 1px;
            background: #1E1E21;
            border: 1px solid #1E1E21;
            border-radius: 8px;
            overflow: hidden;
        }
        .list-item {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 24px;
            padding: 12px 16px;
            background: #101012;
            text-decoration: none;
            cursor: pointer;
            transition: background-color 0.12s ease;
        }
        .list-item:hover {
            background: #171719;
        }
        .list-item-name {
            font-size: 13px;
            font-weight: 600;
            color: #D3D3D3;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .list-item-desc {
            font-size: 13px;
            font-weight: 400;
            color: #6D6D77;
            text-align: right;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Prototypes</h1>
        <div class="list">
            <a class="list-item" href="layout/index.html" target="_blank">
                <span class="list-item-name">Layout</span>
                <span class="list-item-desc">3-panel IDE shell with sidebar, conversation, and canvas</span>
            </a>
<a class="list-item" href="conversation/index.html" target="_blank">
                <span class="list-item-name">Conversation</span>
                <span class="list-item-desc">Chat message blocks, task cards, and demo walkthrough</span>
            </a>
        </div>
    </div>
</body>
</html>
